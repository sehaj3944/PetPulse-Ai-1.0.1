<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F1016" />
      <stop offset="100%" stop-color="#020204" />
    </radialGradient>
    
    <!-- Neon Cyan glow filter -->
    <filter id="neonCyanGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Hot pink/pulse glow filter -->
    <filter id="neonPulseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#0088FF" />
    </linearGradient>

    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3366" />
      <stop offset="100%" stop-color="#FF66B2" />
    </linearGradient>
  </defs>

  <!-- Background Circle (Dark luxury glass style) -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGlow)" stroke="#1F2433" stroke-width="2.5" />
  
  <!-- Subtle futuristic pulse wave background tracking -->
  <path d="M 12 70 Q 28 75 36 60 T 56 60 T 72 80 T 96 55 T 116 68" fill="none" stroke="#00FFFF" stroke-opacity="0.12" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 12 70 Q 28 75 36 60 T 56 60 T 72 80 T 96 55 T 116 68" fill="none" stroke="#FF3366" stroke-opacity="0.08" stroke-width="1.5" stroke-linecap="round" />

  <!-- The Telemetry ECG Heartbeat line running across the paw -->
  <path d="M 28 64 L 46 64 L 52 40 L 58 88 L 64 56 L 68 72 L 74 64 L 100 64" fill="none" stroke="url(#pulseGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonPulseGlow)" />

  <!-- Glowing Paw Print elements -->
  <!-- Pad (Main center shape) -->
  <path d="M 44 80 C 44 88, 52 94, 64 94 C 76 94, 84 88, 84 80 C 84 74, 76 72, 64 72 C 52 72, 44 74, 44 80 Z" fill="none" stroke="url(#cyanGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#neonCyanGlow)" />
  
  <!-- Toes -->
  <!-- Left toe -->
  <ellipse cx="36" cy="60" rx="7" ry="10" transform="rotate(-15 36 60)" fill="url(#cyanGrad)" filter="url(#neonCyanGlow)" />
  <!-- Center-left toe -->
  <ellipse cx="52" cy="46" rx="8" ry="12" fill="url(#cyanGrad)" filter="url(#neonCyanGlow)" />
  <!-- Center-right toe -->
  <ellipse cx="76" cy="46" rx="8" ry="12" fill="url(#cyanGrad)" filter="url(#neonCyanGlow)" />
  <!-- Right toe -->
  <ellipse cx="92" cy="60" rx="7" ry="10" transform="rotate(15 92 60)" fill="url(#cyanGrad)" filter="url(#neonCyanGlow)" />

  <!-- Outer tech hud elements -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="#00FFFF" stroke-opacity="0.15" stroke-dasharray="6 12 24 12" stroke-width="1.5" />
</svg>
